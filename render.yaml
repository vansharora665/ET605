services:
  - type: web
    name: et605-merge-system
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: RECOMMENDATION_THRESHOLD
        value: 0.60
      - key: SCORING_PROFILE
        value: revised_spec
